<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نتائج برنامج عبادة</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{--gD:#1a6b3c;--gDD:#0f4a28;--gL:#d4f4e2;--gM:#5cb87a;--rL:#fcd5d5;--rD:#c0392b;--gold:#b8860b;--bg:#f0f7f0;--sf:#fff;--bd:#d0e8d0;--tx:#1a2e1a;--mu:#5a7a5a;--sh:0 2px 16px rgba(0,0,0,.08)}
*{box-sizing:border-box;margin:0;padding:0}html,body{overflow-x:hidden;width:100%}
body{font-family:'Amiri',system-ui,Tahoma,sans-serif;background:var(--bg);color:var(--tx);padding:1rem .6rem 4rem}
.hdr{text-align:center;padding:1.4rem .8rem;background:linear-gradient(135deg,var(--gDD),var(--gD));border-radius:16px;color:#fff;margin-bottom:1.1rem;box-shadow:var(--sh)}
.bsm{font-size:15px;color:#a8e6c0;margin-bottom:5px}
.hdr h1{font-size:23px;font-weight:700;color:#d4a017;font-family:'Amiri',serif}
.hdr p{font-size:12px;opacity:.8}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:1rem}
.sc{background:var(--sf);border-radius:12px;padding:11px 6px;text-align:center;border:1px solid var(--bd);box-shadow:0 1px 6px rgba(0,0,0,.05)}
.sv{font-size:22px;font-weight:700;color:var(--gD);line-height:1}
.sl{font-size:10px;color:var(--mu);margin-top:2px}
.btns{display:flex;gap:8px;margin-bottom:.8rem}
.btn{font-family:inherit;font-size:13px;font-weight:600;padding:10px;border-radius:10px;cursor:pointer;border:none;flex:1;text-align:center}
.btn-r{background:var(--gD);color:#fff}.btn-r.loading{background:var(--gM)}.btn-x{background:#217346;color:#fff}.btn-admin{background:#fff8e1;color:#856404;border:1.5px solid #f0c040}
.last-up{text-align:center;font-size:11px;color:var(--mu);margin-bottom:1rem}
.card,.girl-card{background:var(--sf);border-radius:14px;border:1px solid var(--bd);margin-bottom:14px;box-shadow:var(--sh);overflow:hidden}
.card{padding:12px}
.card-t{font-size:13px;font-weight:700;color:var(--gD);margin-bottom:10px}
.bars{display:flex;gap:5px;align-items:flex-end;height:110px}
.bi{display:flex;flex-direction:column;align-items:center;flex:1;gap:2px}
.bf{width:100%;border-radius:4px 4px 0 0;min-height:3px;background:var(--gD)}
.bv{font-size:9px;font-weight:700;color:var(--gD)}
.bn{font-size:8px;color:var(--mu);text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;width:100%}
.rank-item{display:flex;align-items:center;gap:8px;padding:8px 9px;border-radius:10px;margin-bottom:6px;border:1px solid var(--bd);background:#fafefa}
.rank-item.t1{background:linear-gradient(135deg,#fef9e7,#fef3cd);border-color:#f0c040}
.rank-item.t2{background:linear-gradient(135deg,#f8f9fa,#e9ecef);border-color:#adb5bd}
.rank-item.t3{background:linear-gradient(135deg,#fdf5ed,#f5e6d3);border-color:#cd9a6c}
.rnum{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0;background:var(--mu)}
.r1{background:linear-gradient(135deg,#d4a017,#f0c040)}.r2{background:linear-gradient(135deg,#7a8288,#adb5bd)}.r3{background:linear-gradient(135deg,#8B4513,#cd9a6c)}
.rinfo{flex:1}.rname{font-size:13px;font-weight:700}.rmeta{font-size:10px;color:var(--mu)}
.rtrack{background:#e8f0e8;border-radius:10px;height:5px;overflow:hidden;margin-top:4px}
.rfill{height:100%;background:linear-gradient(90deg,var(--gM),var(--gD));border-radius:10px}
.rpts{font-size:15px;font-weight:700;color:var(--gD)}
.admin-panel{display:none;background:var(--sf);border:1.5px solid #f0c040;border-radius:14px;padding:12px;margin-bottom:1rem;box-shadow:var(--sh)}.admin-panel.open{display:block}
.admin-panel-title{font-size:13px;font-weight:700;color:#856404;margin-bottom:8px}
.admin-panel-grid{display:grid;grid-template-columns:1fr;gap:8px}
.admin-panel select{font-family:inherit;font-size:13px;border:1.5px solid var(--bd);border-radius:9px;padding:9px;background:#fff;color:var(--tx);outline:none;width:100%}
.admin-panel-actions{display:grid;grid-template-columns:1fr;gap:8px}
.admin-btn{font-family:inherit;font-size:12px;font-weight:700;border-radius:9px;padding:10px;border:none;cursor:pointer}
.admin-del{background:#fff8e1;color:#856404;border:1.5px solid #f0c040}
.admin-panel-note{font-size:10px;color:var(--mu);line-height:1.6;margin-top:7px;text-align:center}
.collapsible-hdr{width:100%;display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:#f0f9f4;border:1px solid var(--gM);border-radius:10px;font-family:inherit;font-size:13px;font-weight:700;color:var(--gD);cursor:pointer;margin-bottom:6px}
.collapsible-body{display:none;padding:4px 0}
.collapsible-body.open{display:block}
.cat-rank-btn,.toggle-btn{width:100%;padding:8px 10px;background:#f0f9f4;color:var(--gD);border:1px solid var(--gM);border-radius:9px;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;margin:5px 0;text-align:right;display:flex;justify-content:space-between;align-items:center}
.cat-rank-body{display:none;background:#f8fbf8;border:1px solid var(--bd);border-radius:9px;padding:8px;margin-bottom:8px}
.ibada-rank{margin-bottom:8px}
.ibada-rank-title{font-size:10.5px;color:var(--mu);font-weight:700;margin-bottom:4px}
.rank-chip{display:inline-flex;align-items:center;gap:3px;background:#fff;border:1px solid #e8ece8;border-radius:12px;padding:2px 7px;font-size:10px;margin:2px}
.rank-chip.first{background:#fef9e7;border-color:#f0c040}
.gc-hdr{padding:12px 14px;background:linear-gradient(135deg,var(--gDD),var(--gD));display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.gc-name{font-size:15px;font-weight:700;color:#fff}
.gc-pts{color:#a8e6c0;font-size:12px;font-weight:600}
.gc-body{padding:11px 12px}
.prog-row{display:flex;justify-content:space-between;font-size:10px;color:var(--mu);margin-bottom:3px}
.prog-t{background:#e0ece0;border-radius:10px;height:6px;overflow:hidden;margin-bottom:8px}
.prog-f{height:100%;background:linear-gradient(90deg,var(--gM),var(--gD));border-radius:10px}
.days-row{display:flex;gap:3px;margin-bottom:9px;flex-wrap:wrap}
.dd{width:28px;height:28px;border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:9px;font-weight:700;border:1px solid var(--bd)}
.dd.f{background:var(--gL);border-color:var(--gM);color:var(--gD)}.dd.e{background:#f0f0f0;color:#bbb}
.dd .dn{font-size:7px;color:inherit;opacity:.7}
.details,.mini-panel{display:none;margin-top:8px}
.details.open,.mini-panel.open{display:block}
.custom-box{margin-bottom:9px;background:#fffdf0;border:1px solid #f0c040;border-radius:10px;padding:8px 10px}
.custom-title{font-size:10px;font-weight:700;color:#856404;margin-bottom:5px}
.chips{display:flex;flex-wrap:wrap;gap:4px}
.chip{background:#fff;border:1px solid #f0c040;color:#856404;font-size:10px;padding:2px 8px;border-radius:10px}
.detail-table{width:100%;border-collapse:collapse;table-layout:fixed;font-size:9px;border:1px solid var(--bd);border-radius:10px;overflow:hidden}
.detail-table th{background:var(--gD);color:#fff;padding:5px 1px;border:1px solid #2b7b4e;font-size:8.5px}
.detail-table th.catH{width:18px}.detail-table th.ibH{width:28%}.detail-table th.ptsH{width:22px}.detail-table th.dayH{width:5.5%}
.detail-table td{padding:3px 1px;border:1px solid #e5eee5;text-align:center;vertical-align:middle}
.detail-table td.ibada{text-align:right;font-weight:700;font-size:9.5px;line-height:1.25;overflow:hidden}
.detail-table td.cat{background:#e8f6ee;color:var(--gD);font-weight:700;writing-mode:vertical-lr;text-orientation:mixed;font-size:8px;max-width:18px}
.id{width:17px;height:17px;border-radius:4px;font-size:8px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;border:0.5px solid var(--bd)}
.id.d{background:var(--gL);color:var(--gD);border-color:var(--gM)}.id.m{background:var(--rL);color:var(--rD)}.id.e{background:#f5f5f5;color:#ccc}
.empty{text-align:center;padding:3rem 1rem;color:var(--mu);font-size:13px;line-height:2}
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--gD);color:#fff;font-size:13px;padding:9px 22px;border-radius:30px;opacity:0;transition:all .3s;pointer-events:none;z-index:9999;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="hdr"><div class="bsm">بسم الله الرحمن الرحيم</div><h1>🌙 النتائج</h1><p>أداء البنات في برنامج العبادة</p></div>
<div class="stats">
  <div class="sc"><div class="sv" id="stTotal">0</div><div class="sl">عدد البنات</div></div>
  <div class="sc"><div class="sv" id="stTop">—</div><div class="sl">أعلى مجموع</div></div>
  <div class="sc"><div class="sv" id="stAvg">—</div><div class="sl">متوسط المجموعة</div></div>
</div>
<div class="btns"><button class="btn btn-r" id="refreshBtn" onclick="loadData()">↻ تحديث النتائج</button><button class="btn btn-admin" onclick="toggleAdminPanel()">⚙️ إدارة</button><button class="btn btn-x" onclick="exportExcel()">⬇ Excel</button></div>
<div class="last-up" id="lastUp"></div>

<div class="admin-panel" id="adminPanel">
  <div class="admin-panel-title">⚙️ إدارة البنات</div>
  <div class="admin-panel-grid">
    <select id="adminGirlSelect">
      <option value="">اختاري اسم البنت...</option>
    </select>
    <div class="admin-panel-actions">
      <button class="admin-btn admin-del" onclick="deleteSelectedGirl()"> حذف البنت نهائياً من السجل</button>
    </div>
  </div>
  <div class="admin-panel-note">تحذير: سيتم إزالة البنت وجميع بياناتها من الشيت نهائياً.</div>
</div>

<div id="main"><div class="empty">🌿<br>اضغطي "تحديث" لتحميل نتائج البنات</div></div>
<div id="toast"></div>

<script>
const SHEET_ID='1rJFer0dgIAJvpdEhZeDmezbxujF4Z0xEVGI7YQLLWUY';
const SCRIPT_URL='https://script.google.com/macros/s/AKfycbz5K3sCja8ERaUGTkD5p8Rtn-_A63_yBHTWvDS8PFbVJ7jzVmBar4b4iCczI83qg3XJ/exec';
const DAYS=10;
const ROWS=[
  {cat:'الأذكار',ibada:'أذكار الصباح',pts:5},
  {cat:'الأذكار',ibada:'أذكار المساء',pts:5},
  {cat:'الأذكار',ibada:'أذكار النوم',pts:5},
  {cat:'القرآن',ibada:'ثلث البقرة',pts:10,badil:'ورد يا لطيف'},
  {cat:'القرآن',ibada:'جزء قرآن',pts:10,badil:'٣× أسماء الله الحسنى مع دعائها — عن كل جزء'},
  {cat:'القرآن',ibada:'حفظ قرآن',pts:5},
  {cat:'القيام',ibada:'قيام قبل الأذان بنصف ساعة',pts:10,badil:'القراءة من الكتاب',link:'https://drive.google.com/file/d/1IbWEFdrNM2LzlibcInj1fwvPcS3-uoXn/view?usp=sharing'},
  {cat:'الصلاة',ibada:'ركعات ضحى',pts:4,badil:'صيغ الاستغفار (عن الضحى والأوابين معاً)'},
  {cat:'الصلاة',ibada:'ركعات أوابين',pts:2,badil:'صيغ الاستغفار (عن الضحى والأوابين معاً)'},
  {cat:'الصلاة',ibada:'فروض الصلاة',pts:5,badil:'٣٣ الباقيات الصالحات عن كل صلاة وسنتها'},
  {cat:'الصلاة',ibada:'سنن الصلوات',pts:5,badil:'٣٣ الباقيات الصالحات عن كل صلاة وسنتها'},
  {cat:'الصلاة',ibada:'أذكار بعد الصلاة',pts:5,note:'آية الكرسي وخواتيم البقرة والمعوذات'},
  {cat:'الذكر',ibada:'صلاة على الرسول ١٠٠',pts:10,note:'١٠٠ صباحاً و١٠٠ مساءً'},
  {cat:'الذكر',ibada:'استغفار ١٠٠',pts:10,note:'١٠٠ صباحاً و١٠٠ مساءً'},
  {cat:'الذكر',ibada:'تهليل ١٠٠',pts:10,note:'١٠٠ صباحاً و١٠٠ مساءً'},
  {cat:'صدقة',ibada:'صدقة يومية',pts:1},
  {cat:'تزكية',ibada:'جلوس على الجوال أكثر من ساعتين (دون واتساب)',pts:-2,negative:true},
  {cat:'تزكية',ibada:'طلب علم شرعي',pts:5,bonus:true},
];
const CAT_ORDER=['الأذكار','القرآن','القيام','الصلاة','الذكر','صدقة','تزكية'];
let girlsData=[];
const sk=(r,d)=>r+'-'+d;
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function readJSON(v,fb){try{return v?JSON.parse(v):fb}catch(e){return fb}}
function cellText(c,i){return c&&c[i]&&c[i].v!=null?c[i].v:'';}
function findJsonCell(c,pred,from){for(let i=from||0;i<c.length;i++){try{const v=cellText(c,i);if(!v)continue;const obj=JSON.parse(v);if(pred(obj))return obj;}catch(e){}}return null;}
function getPts(g,ri,d){const key=ri+'_'+d;return (g.editedPts&&g.editedPts[key]!==undefined)?Number(g.editedPts[key])||0:ROWS[ri].pts;}
function rowPts(g,r,ri,d){return d?getPts(g,ri,d):r.pts;}
function rowName(g,r){return r.ibada;}
function rowMeta(r){let arr=[];if(r.note)arr.push(r.note);if(r.badil)arr.push('بديل: '+r.badil);if(r.bonus)arr.push('⭐ بونص');return arr.join(' | ');}
function rowEarned(g,ri){let t=0;for(let d=1;d<=DAYS;d++)if(((g.state||{})[sk(ri,d)]||0)===1)t+=getPts(g,ri,d);return t;}
function counterPoints(g){return (Number(g.counter)||0)*5;}
function rankNumber(list,index,scoreKey){const score=list[index]&&Number(list[index][scoreKey]);return 1+list.filter((x,idx)=>idx<index&&Number(x[scoreKey])>score).length;}
function rankMedal(rank){return rank===1?'🥇':rank===2?'🥈':rank===3?'🥉':'#'+rank;}
function rankItemClass(rank){return rank===1?'t1':rank===2?'t2':rank===3?'t3':'';}
function rankNumClass(rank){return rank===1?'r1':rank===2?'r2':rank===3?'r3':'';}
function calcDayMaxForGirl(g){return ROWS.reduce((s,r)=>s+((r.pts>0&&!r.bonus)?rowPts(g,r):0),0);}
function calcGirlDayTotal(g,d){let t=0;ROWS.forEach((r,ri)=>{if(((g.state||{})[sk(ri,d)]||0)===1)t+=getPts(g,ri,d);});return t;}
function calcGirlDayPct(g){
  const dayMax=calcDayMaxForGirl(g);if(!dayMax)return null;
  let count=0;
  for(let d=1;d<=DAYS;d++){const hasData=ROWS.some((_,ri)=>((g.state||{})[sk(ri,d)]||0)!==0);if(hasData)count++;}
  if(!count)return null;
  const totalDays=(g.dayTotals||[]).reduce((a,b)=>a+(Number(b)||0),0)+(Number(g.counter)||0)*5;
  return Math.round((totalDays/count)/dayMax*100);
}
async function loadData(){
  const btn=document.getElementById('refreshBtn');btn.textContent='جاري التحميل...';btn.classList.add('loading');btn.disabled=true;
  try{
    const url='https://docs.google.com/spreadsheets/d/'+SHEET_ID+'/gviz/tq?tqx=out:json&sheet='+encodeURIComponent('بيانات')+'&t='+Date.now();
    const resp=await fetch(url);const txt=await resp.text();
    const json=JSON.parse(txt.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);
    const rows=json.table.rows||[];
    girlsData=rows.filter(r=>r.c&&r.c[0]&&r.c[0].v&&r.c[0].v!=='الاسم').map(r=>{
      const c=r.c;
      const dt=[];for(let i=4;i<14;i++)dt.push(c[i]?Number(c[i].v)||0:0);
      const state=findJsonCell(c,obj=>obj&&typeof obj==='object'&&!Array.isArray(obj)&&Object.keys(obj).some(k=>k.indexOf('-')>-1),14)||readJSON(cellText(c,15),{});
      const notes=findJsonCell(c,obj=>obj&&typeof obj==='object'&&!Array.isArray(obj)&&Object.keys(obj).some(k=>!isNaN(Number(k))&&obj[k]&&typeof obj[k]==='object'&&('text' in obj[k])),14)||readJSON(cellText(c,17),{});
      const editedPts=findJsonCell(c,obj=>obj&&typeof obj==='object'&&!Array.isArray(obj)&&Object.keys(obj).some(k=>k.indexOf('_')>-1),14)||readJSON(cellText(c,18),{});
      const rawCounter=cellText(c,19)||cellText(c,20)||0;
      return {
        name:c[0].v,
        grand:c[1]?Number(c[1].v)||0:0,
        avg:c[2]?c[2].v:'—',
        filled:c[3]?c[3].v:0,
        dayTotals:dt,
        state:state,
        editedPts:editedPts,
        counter:Number(rawCounter)||0,
        lastUpdate:c[16]&&c[16].v?c[16].v.toString():'',
        notes:notes,
      };
    });
    document.getElementById('lastUp').textContent='آخر تحديث: '+new Date().toLocaleTimeString('ar');
    render();populateAdminSelect();showToast('تم التحديث ✓ — '+girlsData.length+' بنت');
  }catch(e){console.error(e);showToast('خطأ في التحميل');}
  btn.textContent='↻ تحديث النتائج';btn.classList.remove('loading');btn.disabled=false;
}

function render(){
  const cont=document.getElementById('main');
  if(!girlsData.length){cont.innerHTML='<div class="empty">🌿<br>لا يوجد بيانات بعد</div>';['stTotal','stTop','stAvg'].forEach(id=>document.getElementById(id).textContent='—');return;}
  const sorted=[...girlsData].sort((a,b)=>b.grand-a.grand);
  const maxG=Math.max(...girlsData.map(g=>g.grand),1);
  const avgAll=Math.round(girlsData.reduce((s,g)=>s+Number(g.grand),0)/girlsData.length);
  document.getElementById('stTotal').textContent=girlsData.length;
  document.getElementById('stTop').textContent=sorted[0].grand;
  document.getElementById('stAvg').textContent=avgAll;
  let html='<div class="card"><div class="card-t">📊 مقارنة المجموع الكلي</div><div class="bars">';
  sorted.forEach(g=>{const h=Math.round(g.grand/maxG*95);html+='<div class="bi"><div class="bv">'+g.grand+'</div><div class="bf" style="height:'+h+'px"></div><div class="bn">'+esc(g.name)+'</div></div>';});
  html+='</div></div>';
  html+='<div class="card"><div class="card-t">🏅 الترتيب حسب المجموع الكلي</div>';
  sorted.forEach((g,i)=>{
    const rnk=rankNumber(sorted,i,'grand');const cls=rankItemClass(rnk);const ncls=rankNumClass(rnk);const pct=Math.round(g.grand/maxG*100);
    html+='<div class="rank-item '+cls+'"><div class="rnum '+ncls+'">'+rankMedal(rnk)+'</div><div class="rinfo"><div class="rname">'+esc(g.name)+'</div><div class="rmeta">مجموع: '+g.grand+' | معدل: '+g.avg+' | أيام: '+g.filled+'/'+DAYS+'</div><div class="rtrack"><div class="rfill" style="width:'+pct+'%"></div></div></div><div class="rpts">'+g.grand+'</div></div>';
  });
  html+='</div>';
  html+=perIbadaRanking()+'<div class="card-t" style="margin-bottom:10px">👥 تفصيل أداء كل بنت</div>';
  girlsData.forEach((g,gi)=>{html+=girlCard(g,gi,sorted,maxG);});
  cont.innerHTML=html;
}

function perIbadaRanking(){
  let html='<div class="card"><div class="card-t">🏆 الأولى بكل عبادة</div>';
  CAT_ORDER.forEach((cat,ci)=>{
    const cid='catRank_'+ci;
    html+='<button class="cat-rank-btn" onclick="togglePanel(\''+cid+'\',this)"><span>📌 '+cat+'</span><span>▼</span></button><div class="cat-rank-body" id="'+cid+'">';
    ROWS.forEach((r,ri)=>{
      if(r.cat!==cat||r.negative)return;
      const ranked=girlsData.map(g=>({name:g.name,total:rowEarned(g,ri)})).filter(x=>x.total>0).sort((a,b)=>b.total-a.total);
      html+='<div class="ibada-rank"><div class="ibada-rank-title">'+esc(r.ibada)+'</div>';
      if(!ranked.length)html+='<span style="font-size:10px;color:#aaa">لا يوجد إنجاز بعد</span>';
      ranked.forEach((x,i)=>{const rnk=rankNumber(ranked,i,'total');html+='<span class="rank-chip '+(rnk===1?'first':'')+'">'+(rnk<=3?rankMedal(rnk):rnk+'.')+' <b>'+esc(x.name)+'</b> <span style="color:var(--gD);font-weight:700">'+x.total+'</span></span>';});
      html+='</div>';
    });
    html+='</div>';
  });
  return html+'</div>';
}

function girlCard(g,gi,sorted,maxG){
  const pct=maxG>0?Math.round(g.grand/maxG*100):0;
  const rank=1+sorted.filter(s=>Number(s.grand)>Number(g.grand)).length;
  const medal=rankMedal(rank);
  const dt=g.dayTotals||Array(DAYS).fill(0);
  const dayPct=calcGirlDayPct(g);
  const dots=dt.map((v,i)=>'<div class="dd '+(v>0?'f':'e')+'"><div class="dn">'+(i+1)+'</div>'+(v>0?v:'')+'</div>').join('');
  const editedCount=g.editedPts?Object.keys(g.editedPts).length:0;
  const counterBox='<div class="custom-box"><div class="custom-title">📖 عداد التسميع والتعديلات</div><div class="chips"><span class="chip">أخذ موعد تسميع قرآن: '+(Number(g.counter)||0)+' مرة = '+counterPoints(g)+' نقطة</span><span class="chip">تعديلات النقاط: '+editedCount+'</span></div></div>';
  const body=detailsTable(g)+notesHtml(g)+'<div style="font-size:10px;color:var(--mu);margin-top:8px;text-align:left">آخر إرسال: '+esc(g.lastUpdate||'—')+'</div>';
  const pctColor=dayPct!==null?(dayPct>=80?'#0f4a28':dayPct>=50?'#b8860b':'#c0392b'):'#aaa';
  const pctBadge=dayPct!==null?'<div style="text-align:center;background:linear-gradient(135deg,#f0faf5,#d4f4e2);border:1px solid var(--gM);border-radius:10px;padding:6px 10px;margin-bottom:8px"><div style="font-size:18px;font-weight:700;color:'+pctColor+'">'+dayPct+'%</div><div style="font-size:9px;color:var(--mu)">معدل اليوم من 100</div></div>':'';
  const pctLabel=dayPct!==null?'<span style="background:linear-gradient(135deg,#f0faf5,#d4f4e2);border:1px solid var(--gM);border-radius:8px;padding:2px 8px;font-size:11px;font-weight:700;color:'+pctColor+'">📊 '+dayPct+'%</span>':'';
  return '<div class="girl-card">'
    +'<div class="gc-hdr" onclick="toggleGirlCard('+gi+')">'
    +'<div class="gc-name">'+medal+' '+esc(g.name)+'</div>'
    +'<div style="display:flex;align-items:center;gap:6px">'+pctLabel+'<div class="gc-pts">'+g.grand+' نقطة</div><span id="garr_'+gi+'" style="color:#a8e6c0;font-size:12px">▼</span></div>'
    +'</div>'
    +'<div class="gc-body" id="gbody_'+gi+'" style="display:none">'
    +pctBadge
    +counterBox
    +'<div class="prog-row"><span>التقدم الكلي</span><span>'+pct+'%</span></div><div class="prog-t"><div class="prog-f" style="width:'+pct+'%"></div></div>'
    +'<div class="days-row">'+dots+'</div>'
    +'<button class="toggle-btn" onclick="toggleDetails('+gi+',this)"><span>عرض تفاصيل العبادات</span><span>▼</span></button>'
    +'<div class="details" id="details_'+gi+'">'+body+'</div>'
    +'</div></div>';
}

function detailsTable(g){
  const dayMax=calcDayMaxForGirl(g);
  let html='<table class="detail-table"><thead><tr><th class="catH">الفئة</th><th class="ibH">العبادة</th><th class="ptsH">نقاط</th>';
  for(let d=1;d<=DAYS;d++)html+='<th class="dayH">'+d+'</th>';
  html+='<th class="ptsH">مج</th></tr></thead><tbody>';
  let lastCat='',catRows={};ROWS.forEach(r=>catRows[r.cat]=(catRows[r.cat]||0)+1);
  ROWS.forEach((r,ri)=>{
    const pts=r.pts;let earned=0;html+='<tr>'
    if(r.cat!==lastCat){html+='<td class="cat" rowspan="'+catRows[r.cat]+'">'+esc(r.cat)+'</td>';lastCat=r.cat;}
    html+='<td class="ibada" style="'+(r.negative?'color:#ef4444':'')+'">'+esc(rowName(g,r))+(rowMeta(r)?'<div style="font-size:8px;color:#b8860b;font-weight:400">'+esc(rowMeta(r))+'</div>':'')+'</td><td style="'+(r.negative?'color:#ef4444':'')+'">'+pts+'</td>';
    for(let d=1;d<=DAYS;d++){const v=(g.state&&g.state[sk(ri,d)])||0;const dpts=getPts(g,ri,d);if(v===1)earned+=dpts;let mark=v===1?'✓':v===2?'✗':'';if(v===1&&g.editedPts&&g.editedPts[ri+'_'+d]!==undefined){mark+=(dpts>ROWS[ri].pts?'↑':dpts<ROWS[ri].pts?'↓':'');}html+='<td><span class="id '+(v===1?'d':v===2?'m':'e')+'">'+mark+'</span></td>';}
    html+='<td><b style="'+(r.negative?'color:#ef4444':'')+'">'+earned+'</b></td></tr>';
  });
  html+='<tr style="background:var(--gD);color:#fff;font-weight:700;font-size:9px"><td colspan="3" style="text-align:right;padding-right:4px;background:var(--gDD)">مجموع اليوم</td>';
  for(let d=1;d<=DAYS;d++){let t=0;ROWS.forEach((r,ri)=>{if(((g.state||{})[sk(ri,d)]||0)===1)t+=getPts(g,ri,d);});html+='<td>'+t+'</td>';}
  html+='<td></td></tr>';
  html+='<tr style="background:#fffdf0;color:#856404;font-weight:700;font-size:9px"><td colspan="3" style="text-align:right;padding-right:4px">عداد التسميع</td><td colspan="10">'+(Number(g.counter)||0)+' مرة = '+counterPoints(g)+' نقطة</td><td></td></tr>';
  html+='<tr style="background:#e8f6ee;font-weight:700;font-size:9px"><td colspan="3" style="text-align:right;padding-right:4px;color:var(--gD);border-top:2px solid var(--gM)">معدل اليوم %</td>';
  for(let d=1;d<=DAYS;d++){const hasData=ROWS.some((_,ri)=>((g.state||{})[sk(ri,d)]||0)!==0);if(hasData){const pct=Math.round(calcGirlDayTotal(g,d)/dayMax*100);const color=pct>=80?'var(--gD)':pct>=50?'#b8860b':'var(--rD)';html+='<td style="color:'+color+';font-weight:700;border-top:2px solid var(--gM)">'+pct+'%</td>';}else{html+='<td style="color:#ccc;border-top:2px solid var(--gM)">—</td>';}}
  html+='<td style="border-top:2px solid var(--gM)"></td></tr>';
  return html+'</tbody></table>';
}

function notesHtml(g){
  const notes=g.notes||{};const keys=Object.keys(notes);if(!keys.length)return '';
  let html='<div class="custom-box" style="margin-top:10px"><div class="custom-title">📝 ملاحظات الأيام</div>';
  keys.sort((a,b)=>Number(a)-Number(b)).forEach(d=>{html+='<div style="background:#fffdf0;border:1px solid #f0c040;border-radius:6px;padding:5px 8px;margin-bottom:5px"><div style="font-size:9px;font-weight:700;color:#856404;margin-bottom:2px">اليوم '+d+'</div><div style="font-size:10px;color:var(--tx)">'+esc(notes[d].text||'')+'</div></div>';});
  return html+'</div>';
}

function toggleAdminPanel(){
  const p=document.getElementById('adminPanel');
  if(!p)return;
  p.classList.toggle('open');
}

function populateAdminSelect(){
  const sel=document.getElementById('adminGirlSelect');
  if(!sel)return;
  const current=sel.value;
  sel.innerHTML='<option value="">اختاري اسم البنت...</option>';
  girlsData.map(g=>g.name).filter(Boolean).sort((a,b)=>String(a).localeCompare(String(b),'ar')).forEach(name=>{
    const opt=document.createElement('option');opt.value=name;opt.textContent=name;sel.appendChild(opt);
  });
  if(current)sel.value=current;
}

function getSelectedGirlName(){
  const sel=document.getElementById('adminGirlSelect');
  const name=sel?sel.value.trim():'';
  if(!name){showToast('اختاري اسم البنت أولاً');return '';}
  return name;
}

function deleteSelectedGirl(){const name=getSelectedGirlName();if(!name)return;deleteGirl(name);}

function adminPost(payload,successMsg){
  return new Promise((resolve)=>{
    const params=new URLSearchParams({type:payload.type,name:payload.name});
    const iframe=document.createElement('iframe');iframe.style.display='none';
    iframe.src=SCRIPT_URL+'?'+params.toString()+'&t='+Date.now();
    document.body.appendChild(iframe);
    setTimeout(()=>{iframe.remove();showToast(successMsg);loadData();resolve();},1500);
  });
}

function deleteGirl(name){
  if(!confirm('متأكدة من حذف '+name+' نهائياً من السجل؟'))return;
  adminPost({type:'deleteGirl',name:name},'تم حذف البنت بنجاح ✓');
}

function toggleGirlCard(i){const b=document.getElementById('gbody_'+i);const arr=document.getElementById('garr_'+i);const open=b.style.display==='block';b.style.display=open?'none':'block';if(arr)arr.textContent=open?'▼':'▲';}
function toggleDetails(i,btn){const d=document.getElementById('details_'+i);d.classList.toggle('open');const s=btn.querySelector('span:last-child');if(s)s.textContent=d.classList.contains('open')?'▲':'▼';}
function togglePanel(id,btn){const d=document.getElementById(id);if(!d)return;const isOpen=d.style.display==='block';d.style.display=isOpen?'none':'block';const s=btn.querySelector('span:last-child');if(s)s.textContent=isOpen?'▼':'▲';}
function toggleCollapsible(id,btn){const d=document.getElementById(id);if(!d)return;const open=d.classList.toggle('open');const s=btn.querySelector('span:last-child');if(s)s.textContent=open?'▲':'▼';}

function exportExcel(){
  if(!girlsData.length){showToast('لا يوجد بيانات');return;}
  const wb=XLSX.utils.book_new();const sorted=[...girlsData].sort((a,b)=>b.grand-a.grand);
  const sum=[['الترتيب','الاسم','المجموع','المعدل','الأيام','معدل اليوم %','عداد التسميع',...Array.from({length:DAYS},(_,i)=>'يوم '+(i+1)),'آخر تحديث']];
  sorted.forEach((g,i)=>{const dp=calcGirlDayPct(g);sum.push([i+1,g.name,g.grand,g.avg,g.filled,dp!==null?dp+'%':'—',(Number(g.counter)||0),...(g.dayTotals||[]),g.lastUpdate||'']);});
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(sum),'ملخص');
  girlsData.forEach(g=>{const d=[['الفئة','العبادة','النقاط',...Array.from({length:DAYS},(_,i)=>'يوم '+(i+1)),'المجموع']];ROWS.forEach((r,ri)=>{const pts=r.pts;let s=0;const row=[r.cat,rowName(g,r),pts];for(let day=1;day<=DAYS;day++){const dpts=getPts(g,ri,day);const v=((g.state||{})[sk(ri,day)]||0)===1?dpts:0;row.push(v);s+=v;}row.push(s);d.push(row);});d.push(['عداد','أخذ موعد تسميع قرآن',5,'عدد المرات: '+(Number(g.counter)||0),'النقاط: '+counterPoints(g)]);XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(d),String(g.name).slice(0,28));});
  XLSX.writeFile(wb,'نتائج_البنات.xlsx');showToast('تم التصدير ✓');
}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}
loadData();
</script>
